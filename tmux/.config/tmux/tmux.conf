unbind r
bind r source-file ~/.config/tmux/tmux.conf

# PREFIX 
set -g prefix C-Space
unbind C-b
bind C-s send-prefix

# BASE
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",tmux-256color:Tc"
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g history-limit 50000
set -g focus-events on
setw -g aggressive-resize on
set -g mouse on
set -g allow-passthrough on
set -g base-index 0
set -g renumber-windows on
setw -g pane-base-index 1

# THEME
source-file ~/.config/tmux/cole-theme.conf

# PLUGINS 
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# This is for fixing the ctrl-l navigation not working when inside pipenv shell
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|python[0-9.]*)(diff)?(-wrapped)?'
set -g @vim_navigator_check 'echo "#{pane_current_command}" | grep -iqE "^@vim_navigator_pattern$" || ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +@vim_navigator_pattern$"'

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'p'

set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind '-n M-f'
set -g @floax-bind-menu 'M-m'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'colour108'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# TPM
run '~/.config/tmux/plugins/tpm/tpm'

# PANES AND WINDOWS
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind l select-pane -R

# RESIZE PANES
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind e select-layout even-horizontal

# TABS
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
