# theme
include kanagawa.conf

# fonts
font_family       JetBrainsMono Nerd Font
font_size         12.5
disable_ligatures always
bold_font         auto
italic_font       auto
bold_italic_font  auto

# cursor
cursor_trail 3

# Preserve Ctrl+Return as a distinct key through tmux.
map ctrl+return send_text all \x1b[13;5u

# window
hide_window_decorations titlebar-only
window_margin_width 8 8 8 8
